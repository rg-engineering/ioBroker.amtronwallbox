# Dependabot will run on day 6 of each month at 01:30 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      timezone: "Europe/Berlin"
    target-branch: "master"
    open-pull-requests-limit: 30

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
        interval: monthly
        time: "04:00"
        timezone: Europe/Berlin
    open-pull-requests-limit: 5
    assignees:
        - rg-enineering